<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/react.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ReadAura - Advanced Online Bookstore. Browse premium books, academic text resources, business development titles, and order instantly through WhatsApp." />
    <title>ReadAura | Advanced Online Bookstore Sri Lanka</title>
  </head>
  <body>
    <script>
      (function() {
        const theme = localStorage.getItem('theme') || 'light';
        if (theme === 'light') {
          document.body.classList.add('light');
        } else {
          document.body.classList.remove('light');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
